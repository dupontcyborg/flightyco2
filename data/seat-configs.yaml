# Typical seat configurations per ICAO aircraft type.
#
# Source of truth: hand-curated from manufacturer "typical" configurations
# (Boeing aero magazine, Airbus commercial pages) and corroborated against
# Wikipedia airframe articles. Real airlines vary — a Qatar A350 ≠ an Air
# France A350. TIM uses proprietary OAG fleet data per carrier; we
# approximate to one representative config per airframe. Expected accuracy
# is ±10% on widebody mixed-class flights, much tighter on narrowbody.
#
# Field reference:
#   body:   "narrow" | "wide"  — TIM class-multiplier classification
#   F:      first class seats
#   J:      business class seats
#   W:      premium economy seats
#   Y:      economy seats
#   note:   (optional) caveat / source comment
#
# This file is the source of truth. Run `npm run data:seats` to validate +
# emit public/seat-configs.json (which the app fetches at runtime).
#
# Last reviewed: 2026-05-10

